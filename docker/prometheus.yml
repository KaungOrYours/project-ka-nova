# Ka-Nova — Prometheus scrape config
# Scrapes the Python metrics exporter running on :8000

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "kanova_simulation"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s
